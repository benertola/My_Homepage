<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body>

  <!-- Links Widget -->
  <div class="widget" id="widget-links">
    <div class="widget-header">
      <span>Quick Links</span>
    </div>
    <div class="widget-body">
      <div id="links-container"></div>
      <div class="add-row">
        <input id="link-name-input" type="text" placeholder="Label" />
        <input id="link-url-input" type="text" placeholder="https://..." />
        <button id="link-add-btn">Add</button>
      </div>
      <button id="links-add-category-btn">+ Add category</button>
    </div>
  </div>

  <!-- Weather Widget -->
  <div class="widget" id="widget-weather">
    <div class="widget-header">
      <span>Weather</span>
    </div>
    <div class="widget-body">
      <div id="weather-display">
        <div id="weather-setup">
          <p>Enter your city and API key to get started.</p>
          <input id="weather-city-input" type="text" placeholder="City name" />
          <input id="weather-key-input" type="text" placeholder="OpenWeatherMap API key" />
          <button id="weather-save-btn">Save</button>
          <button id="weather-cancel-btn">Cancel</button>
          <p class="hint">Get a free API key at <a href="https://openweathermap.org" target="_blank">openweathermap.org</a></p>
        </div>
        <div id="weather-data" class="hidden">
          <div id="weather-icon-temp">
            <img id="weather-icon" src="" alt="" />
            <span id="weather-temp"></span>
          </div>
          <div id="weather-desc"></div>
          <div id="weather-city-name"></div>
          <button id="weather-change-btn">Change city</button>
        </div>
      </div>
    </div>
  </div>

  <!-- To-Do Widget -->
  <div class="widget" id="widget-todo">
    <div class="widget-header">
      <span>To-Do</span>
    </div>
    <div class="widget-body">
      <div id="todo-container"></div>
      <div class="add-row">
        <input id="todo-input" type="text" placeholder="New task..." />
        <button id="todo-add-btn">Add</button>
      </div>
      <button id="todo-add-category-btn">+ Add category</button>
    </div>
  </div>

  <!-- World Cup 2026 Widget -->
  <div class="widget" id="widget-worldcup">
    <div class="widget-header">
      <span>⚽ World Cup 2026</span>
    </div>
    <div class="widget-body">
      <div id="wc-content">Loading matches...</div>
    </div>
  </div>

  <!-- Markets Widget -->
  <div class="widget" id="widget-markets">
    <div class="widget-header">
      <span>💹 Markets</span>
    </div>
    <div class="widget-body">
      <div id="markets-content">Loading...</div>
      <div id="markets-updated"></div>
    </div>
  </div>

  <!-- Theme Picker -->
  <button id="theme-btn" title="Change theme">🎨</button>
  <div id="theme-panel" class="hidden">
    <h3>Theme</h3>
    <div class="theme-swatches">
      <button class="theme-swatch" data-theme="istanbul">
        <div class="theme-swatch-preview" style="background: linear-gradient(135deg,#1e2130,#252840);"></div>
        <span>Istanbul</span>
      </button>
      <button class="theme-swatch" data-theme="midnight">
        <div class="theme-swatch-preview" style="background: linear-gradient(135deg,#0d0d1a,#14142a);"></div>
        <span>Midnight</span>
      </button>
      <button class="theme-swatch" data-theme="ocean">
        <div class="theme-swatch-preview" style="background: linear-gradient(135deg,#041c2c,#0a2640);"></div>
        <span>Ocean</span>
      </button>
      <button class="theme-swatch" data-theme="forest">
        <div class="theme-swatch-preview" style="background: linear-gradient(135deg,#051a08,#0a1e0c);"></div>
        <span>Forest</span>
      </button>
      <button class="theme-swatch" data-theme="sunset">
        <div class="theme-swatch-preview" style="background: linear-gradient(135deg,#2a0a20,#260c24);"></div>
        <span>Sunset</span>
      </button>
    </div>
    <div class="theme-divider"></div>
    <button id="theme-upload-btn">📁 Upload photo</button>
    <input id="theme-upload-input" type="file" accept="image/*" style="display:none">
  </div>

  <script src="app.js"></script>
</body>
</html>
